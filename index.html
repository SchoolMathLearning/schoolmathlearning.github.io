<script>
function TabName(){

document.getElementById('showMoreButton').addEventListener('click', function() {
  const container = document.getElementById('hiddenButtonsContainer');
  container.classList.toggle('visible-buttons');
  // Optional: hide the "Show More" button after click
  // this.style.display = 'none'; 
});










function setFavicon() {
    const fileInput = document.getElementById('imageUploader');
    const files = fileInput.files;


    if (files && files.length > 0) {
        const reader = new FileReader();


        reader.onload = function(e) {
            const imageUrl = e.target.result;
            const faviconLink = document.getElementById('favicon');
            
            // Update the href attribute with the new image URL
            faviconLink.href = imageUrl; 
            
            // Optional: update the type attribute based on the file type
            faviconLink.type = files[0].type; 
        };


        // Read the file as a data URL
        reader.readAsDataURL(files[0]);
    } else {
        alert("Please select an image file to upload.");
    }
}
